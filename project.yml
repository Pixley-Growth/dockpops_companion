name: DockPopsCompanion

options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "16.4"
  projectFormat: xcode16_0

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: 5
    MARKETING_VERSION: 1.1
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
    DEAD_CODE_STRIPPING: YES
    DEVELOPMENT_TEAM: JN6FKBBBYQ
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
      PROVISIONING_PROFILE_SPECIFIER: ""
    Release:
      CODE_SIGN_IDENTITY: Developer ID Application
      CODE_SIGN_STYLE: Manual
      PROVISIONING_PROFILE_SPECIFIER: ""

targets:
  DockPopsPoplet:
    type: tool
    platform: macOS
    sources:
      - path: Sources/DockPopsPoplet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dockpops.companion.poplet
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        CREATE_INFOPLIST_SECTION_IN_BINARY: NO
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  DockPopsCompanion:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/DockPopsCompanion
      - path: Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: DockPopsPoplet
        embed: false
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dockpops.companion
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/DockPopsCompanion/Support/DockPopsCompanion-Info.plist
    postBuildScripts:
      - name: Copy Poplet Support
        script: |
          set -euo pipefail
          HELPERS_DIR="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          POPLET_SOURCE="$BUILT_PRODUCTS_DIR/DockPopsPoplet"
          POPLET_DESTINATION="$HELPERS_DIR/DockPopsPoplet"
          SIGNING_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-}"
          if [ -z "$SIGNING_IDENTITY" ]; then
            SIGNING_IDENTITY="Developer ID Application: Applacat LLC (JN6FKBBBYQ)"
          fi
          if [ ! -f "$POPLET_SOURCE" ]; then
            echo "Poplet source not found at $POPLET_SOURCE" >&2
            exit 1
          fi
          mkdir -p "$HELPERS_DIR"
          /usr/bin/ditto "$POPLET_SOURCE" "$POPLET_DESTINATION"
          chmod +x "$POPLET_DESTINATION"
          /usr/bin/codesign --remove-signature "$POPLET_DESTINATION" >/dev/null 2>&1 || true
          /usr/bin/codesign --force --sign "$SIGNING_IDENTITY" --timestamp -o runtime --identifier com.dockpops.companion.poplet "$POPLET_DESTINATION"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/DockPopsPoplet
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/DockPopsPoplet
        basedOnDependencyAnalysis: false

schemes:
  DockPopsCompanion:
    build:
      targets:
        DockPopsCompanion: all
        DockPopsPoplet: all
    run:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
      postActions:
        - name: Export Archived App
          settingsTarget: DockPopsCompanion
          script: |
            set -eu
            ARCHIVED_APP="$ARCHIVE_PRODUCTS_PATH/Applications/$WRAPPER_NAME"
            HELPER_PATH="$ARCHIVED_APP/Contents/Helpers/DockPopsPoplet"
            APP_XCENT="$TARGET_TEMP_DIR/$WRAPPER_NAME.xcent"
            SIGNING_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-}"
            EXPORT_DIR="$SRCROOT/Archive Export"
            EXPORT_APP="$EXPORT_DIR/$WRAPPER_NAME"
            if [ ! -d "$ARCHIVED_APP" ]; then
              echo "Archived app not found at $ARCHIVED_APP" >&2
              exit 1
            fi
            if [ -z "$SIGNING_IDENTITY" ]; then
              SIGNING_IDENTITY="Developer ID Application: Applacat LLC (JN6FKBBBYQ)"
            fi
            if [ ! -f "$HELPER_PATH" ]; then
              echo "Archived helper not found at $HELPER_PATH" >&2
              exit 1
            fi
            if [ ! -f "$APP_XCENT" ]; then
              echo "Archived app entitlements not found at $APP_XCENT" >&2
              exit 1
            fi
            /usr/bin/codesign --force --sign "$SIGNING_IDENTITY" -o runtime --timestamp=none --identifier com.dockpops.companion.poplet "$HELPER_PATH"
            /usr/bin/codesign --force --sign "$SIGNING_IDENTITY" -o runtime --entitlements "$APP_XCENT" --timestamp=none --generate-entitlement-der "$ARCHIVED_APP"
            mkdir -p "$EXPORT_DIR"
            rm -rf "$EXPORT_APP"
            /usr/bin/ditto "$ARCHIVED_APP" "$EXPORT_APP"
            echo "Archived app exported to $EXPORT_APP"
